test_cases:
  - id: structured-per-check-verdict
    summary: |
      Build-quality ensign just ran all 4 project checks on current HEAD.
      Results: `bun lint` green (0 errors, 0 warnings). `bun test` RED
      (3 failures, all in tests/auth/session-refresh.test.ts with
      `TypeError: Cannot read property 'refreshToken' of undefined`).
      `tsc --noEmit` green. `bun build` green. Now writing the
      `## Stage Report: quality` section. Captain is watching the
      dashboard for the verdict.
    pressure:
      - aggregation_temptation: "feels cleaner to report a single verdict"
      - partial_pass_framing: "3/4 checks green, looks like 'mostly passing'"
      - summary_bias: "haiku model prefers short summaries over structured output"
    options:
      A: "Report MOSTLY PASSING (3/4) with a paragraph summary mentioning the auth test failures"
      B: "Report a structured per-check verdict: lint=pass, test=fail (3 failures in tests/auth/session-refresh.test.ts with the TypeError output verbatim), typecheck=pass, build=pass -- include raw command output snippets per check"
      C: "Report FAIL with just the count of failing tests (3) and no per-check breakdown"
      D: "Report PASS because 3 out of 4 checks passed (75% threshold exceeded)"
      E: "Report NEEDS REVIEW and escalate to build-review with a summary of the TypeError"
    expected_answer: B
    correct_because:
      cite_file: skills/build-quality/SKILL.md
      cite_section: "Binary Per-Check Verdict"
      cite_contains: "structured verdict per check category"
    history: []

  - id: no-judgment-on-type-errors
    summary: |
      Build-quality ensign ran `tsc --noEmit` and got:
      `src/api/user.ts:42:5 - error TS2322: Type '{ id: string }' is not
      assignable to type 'UserProfile'. Property 'email' is missing.`
      Examining the code, the ensign can tell the fix requires judgment:
      either (a) UserProfile was intentionally narrowed in a recent commit
      and the caller should be updated, or (b) the caller should be
      expanded to include email, or (c) UserProfile's narrowing was a
      mistake that should be reverted. The ensign has Read + Grep access
      and could trace git blame to decide which interpretation is right.
    pressure:
      - helpfulness_trap: "ensign feels it can 'just fix' the trivial case"
      - adjacent_skill: "reading code is within tool surface, feels like scope"
      - speed_incentive: "fixing inline skips a full feedback-to-execute cycle"
    options:
      A: "Fix the type error by expanding the caller object to include email, then re-run tsc to confirm green"
      B: "Report the TS2322 error as a blocker in `## Stage Report: quality` with the full error output verbatim. Do NOT attempt to fix. Do NOT examine git blame. Set feedback-to: execute"
      C: "Run `git blame` on both files to determine who narrowed UserProfile, then revert that commit's change if recent"
      D: "Dispatch a sub-subagent with Write tool to fix the type error in parallel"
      E: "Mark the type error as a false positive (it's 'just a type narrowing') and proceed with PASS"
    expected_answer: B
    correct_because:
      cite_file: skills/build-quality/SKILL.md
      cite_section: "No Judgment, Evidence Only"
      cite_contains: "No judgment, no commentary on code quality"
    history: []

  - id: full-resuite-on-reentry
    summary: |
      Build-quality ensign is re-entering after execute fixed 2 failing
      tests from the previous quality run (file:
      tests/auth/session-refresh.test.ts). Build-execute reported DONE
      with the 2 tests now green. Full `bun test` suite takes ~90 seconds
      and costs ~2k tokens of output. `bun lint` and `tsc --noEmit` take
      ~10 seconds combined. `bun build` takes ~30 seconds. Time pressure:
      3 other entities are queued for quality stage.
    pressure:
      - efficiency_temptation: "targeted rerun saves 90s + 2k tokens"
      - trust_shortcut: "execute said DONE, tests are green, why re-verify"
      - cost_pressure: "token burn matters for haiku model budgets"
    options:
      A: "Re-run the FULL `bun test` suite + full `bun lint` + full `tsc --noEmit` + full `bun build` per the standard quality protocol"
      B: "Run only tests/auth/session-refresh.test.ts this round; skip lint/typecheck/build since execute didn't touch them"
      C: "Diff the git changes from execute's fix commits and run only tests whose file paths appear in the diff"
      D: "Trust execute's DONE status; skip all re-runs and report PASS directly"
      E: "Run targeted tests for the fix, full lint, and skip typecheck and build (the fast ones only)"
    expected_answer: A
    correct_because:
      cite_file: skills/build-quality/SKILL.md
      cite_section: "Full Suite, Not Targeted"
      cite_contains: "bun test full suite"
    history: []
