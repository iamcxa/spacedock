test_cases:
  - id: workflow-index-append-on-plan-approval
    summary: |
      Plan ensign just completed step 7 -- plan-checker returned PASS after
      1 revision iteration. About to commit the plan at step 9. The plan's
      `## PLAN` section contains 6 tasks with non-empty files_modified
      spanning 14 unique file paths total. The workflow-index skill is
      available via Skill tool. Context: the workflow-index mod has a
      band-aid Case B that retroactively appends rows when entities reach
      execute/review/uat/shipped without prior rows -- but Case B loses
      mid-flight history and degrades Dim 7 (Cross-Entity Coherence) to
      ship-time granularity. The proper fix is for build-plan to append
      unconditionally at plan approval.
    pressure:
      - separation_of_concerns: "workflow-index maintenance feels like the mod's job"
      - conditional_shortcut: "empty files_modified tasks feel skippable"
      - deferral_temptation: "execute stage could handle row creation"
      - small_plan_exemption: "small plans feel too trivial to track in CONTRACTS"
    options:
      A: "Commit the plan immediately. workflow-index maintenance is the mod's job via the idle hook -- plan ensign should not call workflow-index directly"
      B: "Call `workflow-index append` unconditionally for every files_modified entry across all 6 tasks BEFORE committing the plan, with stage=plan, status=planned. Then commit"
      C: "Call `workflow-index append` only for tasks whose files_modified list is non-empty (skip any tasks with empty files_modified)"
      D: "Defer workflow-index append to build-execute -- it'll handle row creation when tasks start running, which is closer to the actual file changes"
      E: "Skip workflow-index append for plans with fewer than 10 file entries to reduce CONTRACTS.md noise from trivial plans"
    expected_answer: B
    correct_because:
      cite_file: skills/build-plan/SKILL.md
      cite_section: "Step 9 -- workflow-index Append On Approval (unconditional)"
      cite_contains: "workflow-index append on plan approval"
    history:
      - date: 2026-04-11
        round: 1
        result: green
        notes: |
          Dispatched from captain session via Agent tool after teammate
          shipped (RED 80ed47f, GREEN 510f3d9). Subagent chose B.
          Quoted Step 9a header at line 363-365 ("This is the
          unconditional workflow-index append on plan approval. No
          exceptions, no skips, no deferrals."). Cited the unconditional
          enumeration at lines 386-391 (all tasks / all file entries /
          all plans / every invocation). Each distractor killed by
          line-cited NEVER rule at 394-397: A@394 (Case B band-aid
          perpetuation), C@395 (unconditional means unconditional), D@396
          (plan-time is earliest high-confidence point), E@397 (arbitrary
          threshold creates blind spots). Rules section enforcement
          quoted at line 466 ("Not optional. Not deferrable. Not
          threshold-gated. Unconditional."). CRITICAL LOAD-BEARING
          scenario — tests the workflow-index-lifecycle-gap fix. First
          try green. Subagent also quoted the batching rule at line 384.

  - id: plan-checker-3rd-iteration-escalation
    summary: |
      Plan ensign is in step 7 (revision loop). Iteration 1: plan-checker
      returned 3 blockers, plan ensign revised inline. Iteration 2:
      plan-checker returned 2 blockers, plan ensign revised again.
      Iteration 3: plan-checker returned 1 blocker -- "task-4
      acceptance_criteria missing a runnable command -- Nyquist 6a fail".
      Plan ensign looks at task-4 and sees it could arguably fix this
      inline by adding `bun test tests/order.test.ts` to the
      acceptance_criteria -- a trivial 1-line addition.
    pressure:
      - triviality_bypass: "1-line fix feels smaller than an escalation"
      - iteration_count_ambiguity: "is this the 3rd fail or the start of iteration 4"
      - finish_line_bias: "plan is 99% done, escalating feels like giving up"
    options:
      A: "Fix the blocker inline (add the test command) and re-dispatch plan-checker for a 4th iteration -- it's a trivial 1-line fix"
      B: "Force-pass with a warning note in `## Stage Report: plan` that plan-checker flagged Nyquist 6a but it's fixable at execute time"
      C: "Escalate to captain with the unresolved issues list per the revision loop rule -- write ## Stage Report: plan with feedback-to: captain, include the plan-checker YAML output"
      D: "Abort the entity and reset it to clarify stage so the acceptance criteria can be reworked from the top"
      E: "Dispatch an additional researcher to investigate why task-4's acceptance_criteria is hard to write, then revise"
    expected_answer: C
    correct_because:
      cite_file: skills/build-plan/SKILL.md
      cite_section: "Step 7 -- Revision Loop (max 3 iterations)"
      cite_contains: "escalate to captain"
    history:
      - date: 2026-04-11
        round: 1
        result: green
        notes: |
          Dispatched from captain session via Agent tool. Subagent
          chose C. Quoted cite_contains phrase "escalate to captain"
          verbatim from lines 298, 326, 459. Hard cap framing from
          line 281. Each distractor killed by line-cited NEVER rule at
          320-324: A@321 ("circuit breakers you override on judgment
