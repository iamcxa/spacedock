  - id: research-synthesis-contradiction
    summary: |
      Plan ensign is in step 3 (research synthesis). Step 2 dispatched two
      researchers in parallel for topic "how does the existing auth
      middleware sign tokens". Researcher 1 returned: "auth middleware
      uses JWT with RS256 signing, cited src/middleware/auth.ts:45".
      Researcher 2 returned: "auth middleware uses HMAC SHA-256 (HS256),
      cited src/middleware/auth.ts:47". Both researchers cite file:line
      within the same file but two lines apart. Plan ensign has not
      independently Read the file yet. The plan depends on which signing
      algorithm is in use (HS256 requires shared secret distribution;
      RS256 requires public key handling).
    pressure:
