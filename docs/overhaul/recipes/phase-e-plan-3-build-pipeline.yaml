      skills/overhaul/references/recipe-format.md Deferred Primitives section).

  - op: update-yaml-block
    section: "## Feature Template"
    block_index: 0
    operations:
      - remove: { field: "profile:" }
      - set: { field: "uat_pending_count:", value: "" }
    reason: |
      Feature Template yaml code block: remove profile: field from example
      frontmatter, add uat_pending_count:. Previously a manual_edit op;
      converted to update-yaml-block (entity 066 -- same primitive as Schema block).

